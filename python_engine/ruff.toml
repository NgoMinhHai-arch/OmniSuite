# Cấu hình Ruff cho dự án Python 2026
line-length = 100
target-version = "py314"

[lint]
# Kích hoạt các quy tắc mặc định (E, F) cộng với:
# I (Isort), UP (PyUpgrade), B (Bugbear), SIM (Simplify)
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
